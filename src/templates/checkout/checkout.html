{% extends "dashboard/_base.html" %}

{% block dashboard_content %}
<section>
    <div class="card card-header-actions mx-auto">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-700">{{ page_title }}</span>
            <a href="{{ url_for('checkout_bp.export_payments_csv') }}"
                class="btn btn-sm btn-outline-primary text-uppercase fw-700 shadow-none">
                <i class="me-2" data-feather="download"></i>
                Télécharger CSV
            </a>
        </div>

        <div class="card-body">
            {# Indicateur de chargement HTMX #}
            <div id="payments-spinner" class="htmx-indicator text-center py-3">
                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                <span class="ms-2 text-muted small">Chargement des paiements...</span>
            </div>

            {# Conteneur rechargé par HTMX #}
            <div id="payments-container" hx-get="{{ url_for('api.get_all_payments', page=1) }}" hx-trigger="load"
                hx-swap="innerHTML" hx-indicator="#payments-spinner">
                <div class="text-center py-4 text-muted small">Initialisation...</div>
            </div>
        </div>
    </div>
</section>
{% endblock dashboard_content %}
